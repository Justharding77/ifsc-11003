flex-direction
justify-content

<style>
.main{
    background-color: black;
    width: 200px;

}
.container1{

}

    height: 50px;
    width: 50px;
}
.div2{
    background-color: red;

    width: 50px;
}
.div3{
    background-color: yellow;

    width: 50px;
}
.div4{
    background-color: blueviolet;
     height: 50px;
    width: 50px;
}
</style>

<div class="main">

    <div class="div1">Div 1</div>
     <div class="div2">Div 2</div>
</div>

<div class="container2">

     <div class="div4">Div 4</div>
</div>
</div>
