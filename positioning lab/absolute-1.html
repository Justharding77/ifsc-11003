```html
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Positioning Lab</title>

  <style>
    html {
      box-sizing: border-box;
    }
    *,
    *:before,
    *:after {
      box-sizing: inherit;
    }

    body {
      background-color: #ECECEC;
      font-weight: bold;
      font-family: Tahoma, Geneva, sans-serif;
      text-align: center;
    }

    h1 {
      color: #000;
      font-weight: normal;
      margin-top: 40px;
    }

    /* MAIN BOX */
    #wrapper {
      position: relative;
      width: 1000px;
      height: 520px;
      margin: 40px auto;
      background-color: #E3E3E3;
      border: 1px solid #c0c0c0;
    }

    /* CENTER WHITE BOX */
    #center-box {
      position: absolute;
      width: 600px;
      height: 150px;
      background-color: #F4F4F4;
      border: 1px solid #cfcfcf;

      top: 185px;
      left: 200px;
    }

    /* COMMON BOX STYLE */
    #navy,
    #teal,
    #blue,
    #aqua,
    #footer {
      position: absolute;
      width: 110px;
      height: 110px;
      line-height: 110px;
      color: white;
    }

    /* CORNERS */
    #navy {
      background-color: #001f3f;
      top: 0px;
      left: 0px;
    }

    #teal {
      background-color: #39CCCC;
      top: 0px;
      right: 0px;
    }

    #blue {
      background-color: #0074D9;
      bottom: 0px;
      left: 0px;
    }

    #aqua {
      background-color: #7FDBFF;
      bottom: 0px;
      right: 0px;
    }

    /* CENTER FOOTER BOX */
    #footer {
      background-color: #666;

      top: 205px;
      left: 445px;
    }
  </style>
</head>

<body>

  <h1>Exercise</h1>

  <section id="wrapper">
    <div id="navy">Navy</div>
    <div id="teal">Teal</div>
    <div id="blue">Blue</div>
    <div id="aqua">Aqua</div>

    <div id="center-box"></div>

    <div id="footer">Footer</div>
  </section>

</body>
</html>
```
