```html
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Positioning Lab</title>

  <style type="text/css">
    /* ---------------Box Sizing----------------- */
    html {
      box-sizing: border-box;
    }

    *,
    *:before,
    *:after {
      box-sizing: inherit;
    }

    body {
      background-color: #ECECEC;
      font-weight: bold;
      font-family: Tahoma, Geneva, sans-serif;
      color: #FFF;
      text-align: center;
      line-height: 24px;
    }

    h1 {
      color: #000;
      font-weight: normal;
      padding: 50px;
    }

    /* WRAPPER */
    #wrapper {
      position: relative;
      background-color: #FFFFFF;
      border: 1px solid #c0c0c0;
      width: 800px;
      height: 500px;
      margin-left: auto;
      margin-right: auto;
      text-shadow: 2px 2px #000;
    }

    /* COMMON BOX STYLE */
    #navy,
    #teal,
    #blue,
    #aqua,
    #footer {
      position: absolute;
      width: 120px;
      height: 120px;
      line-height: 120px;
    }

    /* COLORS */
    #navy {
      background-color: #001f3f;
      top: 0px;
      left: 0px;
    }

    #teal {
      background-color: #39CCCC;
      top: 0px;
      left: 680px;
    }

    #blue {
      background-color: #0074D9;
      top: 380px;
      left: 0px;
    }

    #aqua {
      background-color: #7FDBFF;
      top: 380px;
      left: 680px;
    }

    #footer {
      background-color: #666666;
      top: 190px;
      left: 340px;
    }
  </style>
</head>

<body>

  <h1>Exercise</h1>

  <section id="wrapper">
    <div id="navy">Navy</div>
    <div id="teal">Teal</div>
    <div id="blue">Blue</div>
    <div id="aqua">Aqua</div>
    <div id="footer">Footer</div>
  </section>

</body>

</html>
